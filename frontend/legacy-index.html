<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#eef2ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>order-song</title>
    <link rel="stylesheet" href="assets/styles.css?v=1.0" />
    <link rel="icon" href="favicon.ico" />
  </head>
  <body>
    <main class="app">
      <header id="topbar" class="topbar glass hidden">
        <div class="left">
          <button id="userButton" class="btn small subtle">账号</button>
          <label class="switchWrap" title="仅点歌 / 可放歌">
            <span class="switchLabel">仅点歌</span>
            <input id="modeSwitch" class="switch" type="checkbox" />
            <span class="switchUi" aria-hidden="true"></span>
          </label>
        </div>
        <div class="right">
          <button id="btnMembers" class="btn small">成员</button>
          <button id="leaveRoom" class="btn small danger" disabled>退出房间</button>
        </div>
      </header>

      <!-- Auth view -->
      <section id="viewAuth" class="glass block view">
        <div class="sectionTitle">登录 / 注册</div>
        <div class="row">
          <input id="authUsername" class="input" placeholder="用户名（中英文）" autocomplete="username" />
          <input id="authPassword" class="input" placeholder="密码" type="password" autocomplete="current-password" />
        </div>
        <div class="row" style="margin-top:10px">
          <button id="btnLogin" class="btn">登录</button>
          <button id="btnRegister" class="btn">注册</button>
          <button id="btnAdminLogin" class="btn subtle" style="margin-left:auto">管理端</button>
        </div>
        <div id="authHint" class="hint"></div>
      </section>

      <!-- Admin view -->
      <section id="viewAdmin" class="view hidden" style="overflow:auto;flex:1">
        <div class="glass block" style="max-width:900px;margin:0 auto">
          <div class="row" style="justify-content:space-between">
            <div class="sectionTitle" style="margin:0">管理后台</div>
            <button id="btnAdminLogout" class="btn small danger">退出管理端</button>
          </div>
          <div class="tabs" style="margin-top:14px">
            <button class="tab active" data-admintab="users">用户管理</button>
            <button class="tab" data-admintab="rooms">房间管理</button>
          </div>
          <div id="adminTabUsers"></div>
          <div id="adminTabRooms" class="hidden"></div>
        </div>
      </section>

      <!-- Room view -->
      <section id="viewRooms" class="glass block view hidden">
        <div class="row" style="justify-content:space-between;margin-bottom:10px">
          <div class="sectionTitle" style="margin:0">选择房间</div>
          <button id="roomUserButton" class="btn small subtle">账号</button>
        </div>
        <div class="row">
          <input id="roomName" class="input" placeholder="房间名称（可空，默认：xxx的听歌房）" />
          <button id="btnCreateRoom" class="btn">创建并进入</button>
        </div>
        <div style="height:10px"></div>
        <div id="roomList" class="list"></div>
      </section>

      <!-- App view -->
      <section id="viewApp" class="content view hidden">
        <section class="leftPane">
          <!-- Search overlay -->
          <section id="viewSearch" class="glass block view hidden searchOverlay">
            <div class="row" style="justify-content:space-between">
              <div class="sectionTitle" style="margin:0">搜索</div>
              <button id="btnCloseSearch" class="btn small">返回</button>
            </div>
            <div style="height:10px"></div>
            <div class="row">
              <input id="searchInput2" class="input" placeholder="搜索歌曲 / BV 号 / B站标题" />
              <button id="searchBtn2" class="btn">搜索</button>
            </div>
            <div id="historyWrap" style="margin-top:10px">
              <div class="sectionTitle" style="font-size:14px">搜索历史</div>
              <div id="searchHistory" class="chips"></div>
            </div>
            <div style="height:10px"></div>
            <div class="sectionTitle" style="font-size:14px">搜索结果</div>
            <div id="searchResults2" class="list"></div>
          </section>

          <div class="glass block">
            <div class="row">
              <input id="searchInput" class="input" placeholder="搜索歌曲 / BV 号 / B站标题" />
              <button id="searchBtn" class="btn">搜索</button>
            </div>
            <div id="searchResults" class="list"></div>
          </div>

          <div class="glass block">
            <div class="tabs">
              <button class="tab active" data-tab="trending">热门</button>
              <button class="tab" data-tab="playlists">歌单</button>
              <button id="queueTabBtn" class="tab" data-tab="queue">播放列表 <span class="queueCount"></span></button>
            </div>
            <div id="tabTrending" class="list"></div>
            <div id="tabPlaylists" class="list hidden"></div>
            <div id="tabQueue" class="hidden">
              <div class="tabs mTabs">
                <button class="tab active" data-mtab="queue">播放列表 <span class="queueCount"></span></button>
                <button class="tab" data-mtab="history">历史播放</button>
              </div>
              <div id="mobileTabQueue" class="mTabContent">
                <div id="queueListMobile" class="list"></div>
              </div>
              <div id="mobileTabHistory" class="mTabContent hidden">
                <div id="historyListMobile" class="list"></div>
              </div>
            </div>
          </div>
        </section>

        <aside class="rightPane glass block">
          <div class="tabs rpTabs">
            <button class="tab active" data-rtab="queue">播放列表 <span class="queueCount"></span></button>
            <button class="tab" data-rtab="history">历史播放</button>
          </div>
          <div id="rightTabQueue" class="rpTabContent">
            <div id="queueList" class="list"></div>
          </div>
          <div id="rightTabHistory" class="rpTabContent hidden">
            <div id="historyList" class="list"></div>
          </div>
        </aside>
      </section>

      <!-- User menu popover -->
      <div id="userMenu" class="popover glass hidden" role="dialog" aria-modal="false">
        <div class="sectionTitle" style="margin:0">账号</div>
        <div id="userMenuHint" class="hint"></div>
        <div class="row" style="margin-top:8px">
          <button id="btnOpenRename" class="btn small">改用户名</button>
          <button id="btnOpenPassword" class="btn small">改密码</button>
        </div>
        <div id="renameBox" class="hidden" style="margin-top:8px">
          <div class="row">
            <input id="newUsername" class="input" placeholder="新用户名" />
            <button id="btnRename" class="btn small">保存</button>
          </div>
        </div>
        <div id="passwordBox" class="hidden" style="margin-top:8px">
          <div class="row">
            <input id="oldPassword" class="input" placeholder="旧密码" type="password" />
          </div>
          <div class="row" style="margin-top:6px">
            <input id="newPassword" class="input" placeholder="新密码" type="password" />
            <button id="btnChangePassword" class="btn small">保存</button>
          </div>
        </div>
        <div style="height:10px"></div>
        <button id="btnLogout" class="btn dangerWide">退出登录</button>
      </div>

      <div id="membersPanel" class="popover glass hidden" role="dialog" aria-modal="false">
        <div class="sectionTitle" style="margin:0">房间成员</div>
        <div id="membersList" class="list" style="margin-top:10px"></div>
      </div>

      <footer id="playerBar" class="player glass hidden">
        <div class="nowPlaying">
          <div id="nowTitle" class="title">未播放</div>
          <div id="nowMeta" class="meta">-</div>
          <div class="progressWrap">
            <input id="progress" class="range" type="range" min="0" max="1000" value="0" />
            <div class="progressTime"><span id="timeCurrent">0:00</span><span> / </span><span id="timeTotal">0:00</span></div>
          </div>
        </div>
        <div class="controls">
          <button id="pauseBtn" class="iconBtn" title="暂停/继续" aria-label="暂停/继续"></button>
          <button id="nextBtn" class="iconBtn" title="下一首" aria-label="下一首"></button>
          <div class="volumeControl">
            <button id="muteBtn" class="iconBtn small" title="静音/恢复音量" aria-label="静音/恢复音量"></button>
            <input id="volume" class="range" type="range" min="0" max="100" value="50" disabled />
          </div>
        </div>
      </footer>
    </main>
    <script type="module" src="assets/app.js?v=1.0"></script>
  </body>
</html>
